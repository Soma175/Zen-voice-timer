<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zen Voice Timer</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Ultra-smooth breathing animation for the background glow */
        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }
        .animate-breathe { animation: breathe 8s infinite ease-in-out; }
        
        /* Deep OLED Black background */
        .bg-oled { background-color: #000000; }
        
        /* Modern text glow */
        .text-glow {
            text-shadow: 0 0 80px rgba(20, 184, 166, 0.4);
        }
    </style>
</head>
<body class="bg-oled text-white flex flex-col h-[100dvh] overflow-hidden selection:bg-transparent relative">

    <div class="absolute top-0 left-0 w-full pt-12 flex flex-col items-center justify-center z-20 pointer-events-none">
        <p id="status" class="text-xs text-teal-400/80 tracking-[0.3em] uppercase font-semibold transition-opacity">
            Tap the mic to awaken
        </p>
        <p id="lastCommand" class="text-[10px] text-gray-500 mt-2 italic h-4"></p>
        <div id="streakBadge" class="mt-3 px-3 py-1 rounded-full bg-white/5 border border-white/10 backdrop-blur-md hidden">
            <p id="streakDisplay" class="text-[10px] text-gray-300 uppercase tracking-widest font-medium">Sessions: 0</p>
        </div>
    </div>


    <div class="flex-1 flex items-center justify-center w-full relative z-0 mt-8">
        <div id="halo" class="absolute m-auto w-[80vw] h-[80vw] bg-teal-500 rounded-full blur-[100px] hidden opacity-0 transition-opacity duration-1000"></div>
        
        <div id="timerDisplay" class="relative z-10 w-full text-center text-[24vw] leading-none font-black text-white tracking-tighter tabular-nums text-glow">
            00:00
        </div>
    </div>


    <div class="absolute bottom-10 left-0 w-full px-6 flex justify-center z-20">
        <div class="flex items-center gap-6 bg-[#111] border border-white/10 backdrop-blur-2xl px-8 py-4 rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.8)] transition-all duration-300" id="controlDock">
            
            <button id="micBtn" class="text-3xl hover:scale-110 active:scale-95 transition-transform focus:outline-none relative">
                🎙️
                <span id="micActiveDot" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden shadow-[0_0_10px_rgba(239,68,68,0.8)]"></span>
            </button>
            
            <div class="w-px h-8 bg-white/10"></div>
            
            <button onclick="startFallbackTimer(5)" class="text-xs font-semibold text-gray-400 hover:text-white uppercase tracking-widest transition-colors active:scale-95">+5m</button>
            <button onclick="stopClock()" class="text-xs font-semibold text-gray-400 hover:text-white uppercase tracking-widest transition-colors active:scale-95">Pause</button>
            <button onclick="resetSession()" class="text-xs font-semibold text-gray-400 hover:text-white uppercase tracking-widest transition-colors active:scale-95">Reset</button>
        </div>
    </div>

    <script>
                // --- 1. State Management ---
        const sessionState = {
            mode: null,
            timeLeft: 0,
            initialDuration: 0,
            isRunning: false,
            intervalId: null,
            isListeningEngineActive: false,
            isSpeaking: false
        };

        const timerDisplay = document.getElementById('timerDisplay');
        const statusText = document.getElementById('status');
        const lastCommandText = document.getElementById('lastCommand');
        const micBtn = document.getElementById('micBtn');
        const micActiveDot = document.getElementById('micActiveDot');
        const halo = document.getElementById('halo');
        const streakDisplay = document.getElementById('streakDisplay');
        const streakBadge = document.getElementById('streakBadge');
        const controlDock = document.getElementById('controlDock');

        // NEW: Declare recognition globally so the TTS engine can control it
        let recognition = null;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
        }

        // --- 2. Local Storage Database ---
        function saveSessionLocally(durationSeconds) {
            let sessions = JSON.parse(localStorage.getItem('zenSessions')) || [];
            sessions.push({ id: Date.now(), duration: durationSeconds, date: new Date().toISOString() });
            localStorage.setItem('zenSessions', JSON.stringify(sessions));
            updateStreakDisplay();
        }

        function updateStreakDisplay() {
            let sessions = JSON.parse(localStorage.getItem('zenSessions')) || [];
            if (sessions.length > 0) {
                streakDisplay.innerText = `Sessions: ${sessions.length}`;
                streakBadge.classList.remove('hidden');
            }
        }
        updateStreakDisplay();

        // --- 3. Audio & Voice Engine ---
        let audioCtx = null;
        let audioUnlocked = false;

        function initAudio() {
            if (audioUnlocked) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.001);

            audioUnlocked = true;
        }

        function playZenBell() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(432, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3); 

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 3);
        }

        function speakFeedback(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            // 1. Lock the logic state
            sessionState.isSpeaking = true;
            
            // 2. HARD KILL THE MIC: Abort drops all currently buffered audio immediately
            if (recognition && sessionState.isListeningEngineActive) {
                recognition.abort(); 
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; 
            utterance.pitch = 0.9; 
            
            utterance.onend = () => { 
                // 3. The Echo Buffer
                setTimeout(() => {
                    sessionState.isSpeaking = false; 
                    
                    // 4. Reignite the mic only after the physical echo is gone
                    if (recognition && sessionState.isListeningEngineActive) {
                        try { recognition.start(); } catch (e) {}
                    }
                }, 800);
            };
            
            window.speechSynthesis.speak(utterance);
        }

        // --- 4. Timer Logic ---
        function formatTime(seconds) {
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function tick() {
            if (sessionState.timeLeft > 0) {
                sessionState.timeLeft--;
                timerDisplay.innerText = formatTime(sessionState.timeLeft);
            } else {
                stopClock();
                playZenBell();
                speakFeedback("Session complete. Namaste.");
                statusText.innerText = "Session Complete 🙏";
                timerDisplay.innerText = "00:00";
                halo.classList.remove('animate-breathe');
                halo.classList.add('opacity-0');
                saveSessionLocally(sessionState.initialDuration);
            }
        }

        function startClock() {
            if (sessionState.isRunning) return;
            sessionState.isRunning = true;
            sessionState.intervalId = setInterval(tick, 1000);
            statusText.innerText = "Flowing...";
            halo.classList.add('animate-breathe');
            halo.classList.remove('opacity-0', 'hidden');
        }

        function stopClock() {
            sessionState.isRunning = false;
            clearInterval(sessionState.intervalId);
            halo.classList.remove('animate-breathe');
        }

        function resetSession() {
            stopClock();
            sessionState.mode = null;
            sessionState.timeLeft = 0;
            timerDisplay.innerText = "00:00";
            statusText.innerText = "Ready. Tell me a time.";
            halo.classList.add('opacity-0');
        }

        function startFallbackTimer(minutes) {
            initAudio(); 
            sessionState.mode = 'timer';
            sessionState.timeLeft += (minutes * 60);
            sessionState.initialDuration = sessionState.timeLeft;
            timerDisplay.innerText = formatTime(sessionState.timeLeft);
            startClock();
        }

        // --- 5. Intent Parsing ---
        function parseCommand(transcript) {
            if (sessionState.isSpeaking) return;

            lastCommandText.innerText = `Heard: "${transcript}"`;

            const timerMatch = transcript.match(/(?:set|start)?\s*(?:a)?\s*(\d+)\s*(?:minute|minutes|min|mins)/);
            const secondsMatch = transcript.match(/(\d+)\s*(?:second|seconds|sec|secs)/);

            if (timerMatch || secondsMatch) {
                let totalSeconds = 0;
                let verbalMinutes = 0;
                let verbalSeconds = 0;

                if (timerMatch) { verbalMinutes = parseInt(timerMatch[1]); totalSeconds += verbalMinutes * 60; }
                if (secondsMatch) { verbalSeconds = parseInt(secondsMatch[1]); totalSeconds += verbalSeconds; }
                
                sessionState.mode = 'timer';
                sessionState.timeLeft = totalSeconds;
                sessionState.initialDuration = totalSeconds;
                timerDisplay.innerText = formatTime(sessionState.timeLeft);
                
                let feedback = "Beginning ";
                if (verbalMinutes > 0) feedback += `${verbalMinutes} minute${verbalMinutes > 1 ? 's' : ''}`;
                if (verbalMinutes > 0 && verbalSeconds > 0) feedback += " and ";
                if (verbalSeconds > 0) feedback += `${verbalSeconds} second${verbalSeconds > 1 ? 's' : ''}`;
                
                speakFeedback(feedback);
                startClock();
                return;
            }

            if (transcript.includes("pause") || transcript.includes("stop") || transcript.includes("hold")) {
                stopClock();
                speakFeedback("Holding.");
                statusText.innerText = "Paused";
                return;
            }

            if (transcript.includes("resume") || transcript.includes("continue")) {
                if (sessionState.timeLeft > 0) { speakFeedback("Flowing."); startClock(); }
                return;
            }

            if (transcript.includes("reset") || transcript.includes("clear")) {
                speakFeedback("Wiped.");
                resetSession();
                return;
            }
        }

        // --- 6. Continuous Listening Engine Controls ---
        if (recognition) {
            micBtn.onclick = () => {
                initAudio();
                
                if (!window.speechSynthesis.speaking) {
                    let silentUtterance = new SpeechSynthesisUtterance('');
                    silentUtterance.volume = 0;
                    window.speechSynthesis.speak(silentUtterance);
                }

                if (!sessionState.isListeningEngineActive) {
                    sessionState.isListeningEngineActive = true;
                    try { recognition.start(); } catch (e) {}
                    speakFeedback("I am listening.");
                    
                    controlDock.classList.add('border-teal-500/50', 'shadow-[0_0_30px_rgba(20,184,166,0.2)]');
                    micActiveDot.classList.remove('hidden');
                    statusText.innerText = "Always listening. Say a command.";
                } else {
                    sessionState.isListeningEngineActive = false;
                    recognition.stop();
                    speakFeedback("Microphone asleep.");
                    
                    controlDock.classList.remove('border-teal-500/50', 'shadow-[0_0_30px_rgba(20,184,166,0.2)]');
                    micActiveDot.classList.add('hidden');
                    statusText.innerText = "Mic asleep. Tap to awaken.";
                }
            };

            recognition.onresult = (event) => {
                const currentResultIndex = event.results.length - 1;
                const transcript = event.results[currentResultIndex][0].transcript.toLowerCase().trim();
                parseCommand(transcript);
            };

            recognition.onend = () => {
                // THE CRITICAL FIX: Do not auto-restart if the app is currently talking!
                if (sessionState.isListeningEngineActive && !sessionState.isSpeaking) {
                    try { recognition.start(); } catch (e) {}
                }
            };
        } else {
            statusText.innerText = "Speech recognition not supported on this browser.";
        }

        // --- 7. PWA Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registered:', registration.scope))
                    .catch(err => console.log('ServiceWorker registration failed:', err));
            });
        }

    </script>
</body>
</html>
